services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: aboutlink_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aboutlink

  nginx:
    image: nginx:1.25-alpine
    container_name: aboutlink_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - aboutlink

  db:
    image: mysql:8.0
    container_name: aboutlink_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-aboutlink_me_backend}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-aboutlink}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aboutlink

networks:
  aboutlink:
    driver: bridge

volumes:
  db_data:
